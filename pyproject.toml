[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: marks tests that require live Firebase connection (deselect with '-m not integration')",
    "unit: marks fast unit tests with no external dependencies",
]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["shared", "ingestion", "chat", "mcp"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
